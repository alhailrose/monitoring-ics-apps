services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:${BACKEND_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DEFAULT_REGION: ${DEFAULT_REGION:-ap-southeast-3}
      MAX_WORKERS: ${MAX_WORKERS:-5}
      EXECUTION_TIMEOUT: ${EXECUTION_TIMEOUT:-300}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      API_AUTH_ENABLED: ${API_AUTH_ENABLED:-true}
      API_KEYS: ${API_KEYS}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      APP_BASE_URL: ${APP_BASE_URL:-https://msmonitoring.bagusganteng.app}
    volumes:
      # Mount ~/.aws dari EC2 host — config + SSO cache
      # Jalankan `aws sso login --profile <sso-session>` di terminal jika token expired
      - ${HOME}/.aws:/home/appuser/.aws:rw
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:${FRONTEND_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      BACKEND_URL: http://nginx/api/v1
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://msmonitoring.bagusganteng.app/auth/google/callback}
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
