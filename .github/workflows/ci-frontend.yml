name: CI Frontend

on:
  pull_request:
    paths:
      - "web/**"
      - "apps/web/**"
      - "scripts/ci/web-quality.sh"
      - ".github/workflows/ci-frontend.yml"
  push:
    branches:
      - main
    paths:
      - "web/**"
      - "apps/web/**"
      - "scripts/ci/web-quality.sh"
      - ".github/workflows/ci-frontend.yml"

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix web

      - name: Run web quality gates
        run: bash scripts/ci/web-quality.sh

      - name: Upload web build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
