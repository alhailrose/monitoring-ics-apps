name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: monitoring_test
          POSTGRES_USER: monitor
          POSTGRES_PASSWORD: monitor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U monitor -d monitoring_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+psycopg://monitor:monitor@localhost:5432/monitoring_test
        run: uv run pytest tests/unit/ -v --tb=short

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
