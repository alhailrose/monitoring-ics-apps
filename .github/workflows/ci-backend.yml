name: CI Backend

on:
  pull_request:
    paths:
      - "backend/**"
      - "apps/api/**"
      - "src/app/api/**"
      - "src/app/api/dependencies.py"
      - "src/app/services/**"
      - "src/app/settings.py"
      - "src/db/**"
      - "tests/unit/test_api_main.py"
      - "tests/unit/test_checks_route.py"
      - "tests/unit/test_check_executor.py"
      - "tests/unit/test_settings_runtime.py"
      - "tests/unit/test_src_adapters.py"
      - "scripts/ci/api-quality.sh"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci-backend.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "apps/api/**"
      - "src/app/api/**"
      - "src/app/api/dependencies.py"
      - "src/app/services/**"
      - "src/app/settings.py"
      - "src/db/**"
      - "tests/unit/test_api_main.py"
      - "tests/unit/test_checks_route.py"
      - "tests/unit/test_check_executor.py"
      - "tests/unit/test_settings_runtime.py"
      - "tests/unit/test_src_adapters.py"
      - "scripts/ci/api-quality.sh"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci-backend.yml"

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run API quality gates
        run: bash scripts/ci/api-quality.sh
