name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & Push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      # Setup SSH key and config for ProxyJump bastion → EC2
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "Key fingerprint:"
          ssh-keygen -l -f ~/.ssh/deploy_key || echo "Key parse failed"
          echo "Key file size: $(wc -c < ~/.ssh/deploy_key) bytes"
          echo "First line: $(head -1 ~/.ssh/deploy_key)"
          echo "Last line: $(tail -1 ~/.ssh/deploy_key)"
          cat > ~/.ssh/config <<EOF
          Host bastion
            HostName ${{ secrets.EC2_BASTION_HOST }}
            User ${{ secrets.EC2_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          Host ec2target
            HostName ${{ secrets.EC2_HOST }}
            User ${{ secrets.EC2_USER }}
            IdentityFile ~/.ssh/deploy_key
            ProxyJump bastion
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

      # Copy compose & nginx to EC2
      - name: Copy compose & nginx to EC2
        run: |
          ssh ec2target "mkdir -p /opt/monitoring-app"
          scp infra/docker/docker-compose.prod.yml infra/docker/nginx.prod.conf ec2target:/opt/monitoring-app/

      # Write .env on runner then SCP it
      - name: Write .env and copy all files to EC2
        run: |
          cat > /tmp/deploy.env << 'EOF'
          GITHUB_REPOSITORY=${{ github.repository }}
          IMAGE_TAG=${{ github.sha }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          DEFAULT_REGION=${{ vars.DEFAULT_REGION || 'ap-southeast-3' }}
          MAX_WORKERS=${{ vars.MAX_WORKERS || '5' }}
          EXECUTION_TIMEOUT=${{ vars.EXECUTION_TIMEOUT || '300' }}
          CORS_ORIGINS=${{ vars.CORS_ORIGINS || '*' }}
          API_AUTH_ENABLED=${{ vars.API_AUTH_ENABLED || 'true' }}
          NEXT_PUBLIC_API_URL=/api
          EOF
          scp /tmp/deploy.env ec2target:/opt/monitoring-app/.env

      - name: Deploy on EC2
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh ec2target "
            set -e
            cd /opt/monitoring-app
            echo '${GHCR_TOKEN}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker run --rm \
              --env-file .env \
              ghcr.io/${{ github.repository }}/backend:${{ github.sha }} \
              alembic upgrade head
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
          "

      - name: Smoke test
        run: |
          sleep 10
          curl -f http://${{ secrets.EC2_HOST }}/health || exit 1
          echo "Smoke test passed"
