name: CI TUI

on:
  pull_request:
    paths:
      - "apps/tui/**"
      - "src/app/cli/**"
      - "src/app/tui/**"
      - "src/checks/**"
      - "src/core/runtime/**"
      - "configs/**"
      - "tests/unit/test_interactive_v2.py"
      - "tests/unit/test_tui_*.py"
      - "tests/unit/test_cli_without_tui_dependency.py"
      - "scripts/ci/tui-quality.sh"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci-tui.yml"
  push:
    branches:
      - main
    paths:
      - "apps/tui/**"
      - "src/app/cli/**"
      - "src/app/tui/**"
      - "src/checks/**"
      - "src/core/runtime/**"
      - "configs/**"
      - "tests/unit/test_interactive_v2.py"
      - "tests/unit/test_tui_*.py"
      - "tests/unit/test_cli_without_tui_dependency.py"
      - "scripts/ci/tui-quality.sh"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci-tui.yml"

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run TUI quality gates
        run: bash scripts/ci/tui-quality.sh
